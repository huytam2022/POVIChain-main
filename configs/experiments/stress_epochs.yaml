experiment_id: stress_epochs
scenario: multi_domain_stress

node_count: 100
malicious_fraction: 0.0
committee_threshold_theta: 20.0

training_epochs: 500
blocks_per_epoch: 4
tx_per_block: 220
workload_ramp_epochs: 60
workload_min_fraction: 0.10

network_profile: network_fast

loss_levels: [0.00, 0.05, 0.10, 0.20]
rolling_window_epochs: 20

network_jitter_ms: 12.0

recovery_overhead_per_drop_ms: 6.0
recovery_drain_per_epoch_ms: 1.2
max_overhead_ms: 100.0

reputation_weights:
  alpha: 0.7
  beta: 0.15
  gamma: 0.10
  lambda: 0.25
  delta: 0.25
  eta: 0.02
  mu: 0.15
  r_min: 0.05


output:
  output_dir: outputs/stress_epochs
